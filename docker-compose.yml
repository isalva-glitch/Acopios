version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: acopios_db
    environment:
      POSTGRES_DB: acopios
      POSTGRES_USER: acopios_user
      POSTGRES_PASSWORD: acopios_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acopios_user -d acopios"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acopios_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://acopios_user:acopios_password@db:5432/acopios
      JWT_SECRET: change-me-in-production-use-env-file
      STORAGE_PATH: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: acopios_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  storage_data:
